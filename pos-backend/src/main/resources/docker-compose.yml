version: "3.8"

services:
  posdb:
    image: mysql:8.0
    container_name: userdb
    ports:
      - "3301:3306"
    env_file:
      - ../../../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 10s
    networks:
      - zosh

  pos-system:
    image: your-dockerhub-username/pos-system:latest
    depends_on:
      posdb:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - ../../../.env
    environment:
      DB_HOST: posdb
      DB_PORT: 3306
      DB_NAME: userdb
    networks:
      - zosh

networks:
  zosh:
